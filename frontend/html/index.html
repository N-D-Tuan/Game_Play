<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Fantasy</title>
    <link rel="stylesheet" href="../css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="home-screen">
        <div class="overlay-dark"></div>
        <h1 class="game-title">DARK FANTASY</h1>
        
        <div class="menu-buttons">
            <button class="menu-btn" id="btn-practice">Tập luyện</button>
            <button class="menu-btn" id="btn-campaign">Vượt ải</button>
            <button class="menu-btn" id="btn-inventory">Kho đồ</button>
            <button class="menu-btn" id="btn-settings">Cài đặt</button>
        </div>
    </div>

    <div id="game-container" style="display: none;"></div>

    <div id="settings-modal" style="display: none;">
        <div class="settings-content">
            <h2 class="settings-title">CÀI ĐẶT</h2>
                
            <div class="settings-tabs">
                <button class="tab-btn active" id="tab-audio">Âm lượng</button>
                <button class="tab-btn" id="tab-controls">Điều chỉnh</button>
            </div>
                
            <div class="settings-body">
                <div id="audio-settings" class="tab-pane active">
                    <div class="volume-control">
                        <span style="font-size: 24px;">Nhạc nền:</span>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
                        <button id="mute-btn">🔮</button>
                    </div>
                </div>
                    
                <div id="controls-settings" class="tab-pane" style="display: none;">
                    <p style="color: #888; font-size: 14px; margin-bottom: 15px;">Click vào ô để đổi phím</p>
                    <div class="keybind-grid">
                        <div class="keybind-group">
                            <h3 style="color: #ffcc00;">Di chuyển</h3>
                            <div class="keybind-row"><span>Lên</span><button class="key-btn" data-type="move" data-key="up">ARROWUP</button></div>
                            <div class="keybind-row"><span>Xuống</span><button class="key-btn" data-type="move" data-key="down">ARROWDOWN</button></div>
                            <div class="keybind-row"><span>Trái</span><button class="key-btn" data-type="move" data-key="left">ARROWLEFT</button></div>
                            <div class="keybind-row"><span>Phải</span><button class="key-btn" data-type="move" data-key="right">ARROWRIGHT</button></div>
                            <div class="keybind-row"><span>Đánh thường</span><button class="key-btn" data-type="move" data-key="melee">SPACE</button></div>
                        </div>
                        <div class="keybind-group">
                            <h3 style="color: #ffcc00;">Kỹ năng</h3>
                            <div class="keybind-row"><span>Thiên thạch</span><button class="key-btn" data-type="skill" data-key="meteor">1</button></div>
                            <div class="keybind-row"><span>Phi kiếm</span><button class="key-btn" data-type="skill" data-key="swords">2</button></div>
                            <div class="keybind-row"><span>Sấm sét</span><button class="key-btn" data-type="skill" data-key="lightning">3</button></div>
                            <div class="keybind-row"><span>Lá chắn</span><button class="key-btn" data-type="skill" data-key="shield">4</button></div>
                            <div class="keybind-row"><span>Hồi máu</span><button class="key-btn" data-type="skill" data-key="heal">5</button></div>
                            <div class="keybind-row"><span>Thổ độn</span><button class="key-btn" data-type="skill" data-key="earth">6</button></div>
                            <div class="keybind-row"><span>Vạn tiễn</span><button class="key-btn" data-type="skill" data-key="arrows">7</button></div>
                            <div class="keybind-row"><span>Tàu chiến</span><button class="key-btn" data-type="skill" data-key="anchor">8</button></div>
                            <div class="keybind-row"><span>Hình nhân</span><button class="key-btn" data-type="skill" data-key="doll">9</button></div>
                        </div>
                    </div>
                </div>
            </div>
                
            <button id="close-settings" class="close-btn">ĐÓNG</button>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/game.js"></script>

</body>
</html>
